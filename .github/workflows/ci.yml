name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Lint
        run: |
          pip install flake8 mypy
          flake8 agents/ reasoning/ core/
          mypy agents/ reasoning/ core/ --ignore-missing-imports

      - name: Test
        run: |
          pytest tests/ -v --cov=agents --cov=reasoning --cov=core

      - name: Type check
        run: |
          pip install pyright
          pyright agents/ reasoning/ core/
